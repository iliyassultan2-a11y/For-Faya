<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для тебя ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
            color: #fff;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 20px;
            margin: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff6b81;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ffe0e6;
        }

        .hidden {
            display: none;
            margin-top: 30px;
            font-size: 22px;
        }

        .heart {
            font-size: 50px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Привет 💕</h1>
    <p>У меня для тебя кое-что есть...</p>
    <button onclick="showMessage()">Нажми сюда</button>

    <div id="message" class="hidden">
        <p>Ты очень классная 🌸</p>
        <p>Спасибо, что ты есть 💖</p>
        <div class="heart">❤️</div>
    </div>
</div>

<script>
    function showMessage() {
        document.getElementById("message").style.display = "block";
    }
</script>

</body>
</html>
